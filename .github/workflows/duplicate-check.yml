name: Duplicate Check

on:
  issues:
    types: [opened]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;

            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              per_page: 100
            });

            const duplicates = issues.filter(i => 
              i.number !== issueNumber &&
              i.title.toLowerCase().includes(title.split(' ').slice(0,3).join(' '))
            );

            if (duplicates.length > 0) {
              const links = duplicates.map(i => `- #${i.number}: ${i.title}`).join('\n');
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issueNumber,
                body: `⚠️ **Possible duplicate detected**

This issue may already exist:
${links}

Please check if your issue is covered by one of the above before proceeding. 
If this is different, explain how in a comment and a maintainer will confirm.`
              });
              
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: issueNumber,
                labels: ['needs-triage']
              });
            }
